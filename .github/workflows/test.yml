name: Tests

on:
  pull_request:
  push:
    # On main this is also covered by deploy.yml, but keeping it here means
    # the test status appears as a separate check for clarity.
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Verify production build still succeeds
        run: npm run build
