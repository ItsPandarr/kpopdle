name: Build and deploy to GitHub Pages

on:
  # Deploy when main moves.
  push:
    branches: [main]
  # Manual re-deploy from the Actions tab.
  workflow_dispatch:

# Standard permissions for the GitHub-Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Cancels in-flight runs but lets a queued run
# finish so the latest commit always wins.
concurrency:
  group: pages
  cancel-in-progress: false

# Opt every JavaScript-based action (upload-artifact, download-artifact,
# etc.) into the Node 24 runtime ahead of GitHub's June 2026 cutover.
# Until then the runners default to Node 20, which fires deprecation
# warnings on actions/upload-artifact@v4 and download-artifact@v4 even
# though those are the latest released versions. Setting the var
# workflow-wide is GitHub's documented opt-in path and avoids having to
# chase per-action releases as they migrate.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      # Resolves the Pages site URL (handles user-pages vs project-pages
      # automatically — base_url is e.g. https://user.github.io/repo/ or
      # https://user.github.io/). Has to run BEFORE the build so we can
      # feed it in via env to substitute the sitemap.xml placeholder.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build dist/
        run: npm run build
        env:
          # Used by scripts/build.mjs to substitute the <loc> placeholder
          # in sitemap.xml. Without this the sitemap ships with the
          # https://example.com/ placeholder and crawlers ignore it.
          KPOPDLE_URL: ${{ steps.pages.outputs.base_url }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # The build script emits the production bundle here.
          path: ./dist

      # Same bundle, uploaded as a plain artifact for downstream non-Pages
      # deploys (itch.io). The Pages-specific artifact above is a tarball
      # in a special channel; this one is a normal directory upload that
      # actions/download-artifact can fetch into a working dist/ in one
      # step. Tiny (~200 KB) — the duplication cost is negligible.
      - name: Upload plain dist artifact (for itch.io)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Mirror the build to itch.io alongside GitHub Pages so the game has a
  # second discoverable home. Runs in parallel with the Pages deploy — they
  # ship the same `dist/` bundle and neither blocks the other.
  #
  # Requires an `ITCH_API_KEY` repo secret with a token from
  # https://itch.io/user/settings/api-keys. The credential-check step
  # below short-circuits the rest of the job with a green tick when the
  # secret is unset, so forks (which won't have it) don't produce red
  # failures on every push.
  deploy-itch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check for itch.io credentials
        id: check
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: |
          if [ -n "$BUTLER_API_KEY" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::ITCH_API_KEY secret not set; skipping itch.io deploy."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dist artifact
        if: steps.check.outputs.ok == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Butler is itch.io's official CLI for HTML5 pushes. Stable URL
      # straight from itch.io's own CDN (broth.itch.zone); single-binary,
      # zero npm deps, ~6 MB download.
      - name: Install butler
        if: steps.check.outputs.ok == 'true'
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      # Push the dist to the `html5` channel on pandarr/kpopdle. Butler
      # patches deltas after the first push, so subsequent runs upload
      # only changed blocks of the bundle (typically a few KB).
      - name: Push to itch.io
        if: steps.check.outputs.ok == 'true'
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: ./butler push dist pandarr/kpopdle:html5
